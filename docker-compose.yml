# version: '3.8' (obsolete)

services:
  app:
    build: .
    container_name: projet_web_app
    env_file: .env
    ports:
      - "${PORT_WEB}:80"
    volumes:
      - .:/var/www/html
      - ./uploads:/var/www/html/uploads
      - ./.docker/php.ini:/usr/local/etc/php/conf.d/custom-php.ini
    environment:
      - DB_HOST=${DB_HOST}
      - DB_NAME=${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: projet_web_db
    restart: always
    command: --default-authentication-plugin=mysql_native_password
    env_file: .env
    environment:
      - MYSQL_DATABASE=${DB_NAME}
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    ports:
      - "${PORT_DB}:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./database/schema.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  db_data:
